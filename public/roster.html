<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인원부 — 예약 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f3f4f6; }
  ::-webkit-scrollbar { height: 4px; width: 4px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  input, select, textarea { font-family: Arial, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SETTINGS_KEY  = "roster_settings_v1";
const ADMIN_KEY_KEY = "roster_admin_key";

const DAYS = ['일','월','화','수','목','금','토'];
const sessLabel = (s) => {
  if (!s.date) return s.label || '';
  const d = new Date(s.date + 'T00:00:00');
  return (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + DAYS[d.getDay()] + ')';
};
const sortSessions = (arr) =>
  [...arr].sort((a, b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));

const formatPhone = (v) => {
  const d = v.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 3) return d;
  if (d.startsWith('02')) {
    if (d.length <= 5) return d.slice(0,2) + '-' + d.slice(2);
    if (d.length <= 9) return d.slice(0,2) + '-' + d.slice(2,5) + '-' + d.slice(5);
    return d.slice(0,2) + '-' + d.slice(2,6) + '-' + d.slice(6);
  }
  if (d.length <= 6) return d.slice(0,3) + '-' + d.slice(3);
  if (d.length <= 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
  return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
};

const DEFAULT_SETTINGS = {
  showTitle:   "",
  festivalName:"",
  totalSeats:  50,
  sources: [
    { name:"네이버",   color:"#03c75a" },
    { name:"인터파크", color:"#ff6b00" },
    { name:"직접",     color:"#6b7280" },
  ],
  seatAlloc: {},
};

const TYPE_COLORS = {
  "일반":"#1a56db","페스티벌 패키지 할인":"#7e3af2",
  "삼일로창고극장 맴버쉽 할인":"#0e9f6e","예술인패스":"#e3a008",
  "배우/스태프 할인":"#e02424","초대권":"#6b7280","장애인 할인":"#0891b2",
};
const SRC_PALETTE = ["#03c75a","#ff6b00","#6b7280","#1a56db","#7e3af2","#0891b2","#e3a008","#e02424"];

const Pill = ({type}) => {
  const c = TYPE_COLORS[type] || "#6b7280";
  return <span style={{background:c+"18",color:c,border:`1px solid ${c}40`,borderRadius:999,padding:"1px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{type}</span>;
};

const PayBadge = ({payStatus}) => {
  const map = {
    "입금확인":    { bg:"#f0fdf4", color:"#16a34a", border:"#86efac", label:"결제완료" },
    "미입금":      { bg:"#fff7ed", color:"#c2410c", border:"#fed7aa", label:"미입금"   },
    "현장결제예정":{ bg:"#eff6ff", color:"#1d4ed8", border:"#bfdbfe", label:"현장결제" },
    "관리자취소":  { bg:"#fef2f2", color:"#e02424", border:"#fca5a5", label:"취소"     },
  };
  const s = map[payStatus] || { bg:"#f9fafb", color:"#6b7280", border:"#e5e7eb", label: payStatus || "-" };
  return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`,borderRadius:999,padding:"1px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>;
};

const NumInput = ({value, onChange, min=0, style={}, ...props}) => {
  const isComposing = React.useRef(false);
  return (
    <input type="number" min={min} value={value}
      onCompositionStart={()=>isComposing.current=true}
      onCompositionEnd={()=>isComposing.current=false}
      onKeyDown={e=>{ if(e.key==="Enter"&&isComposing.current) e.preventDefault(); }}
      onChange={e=>{ const v=e.target.value; onChange(v===""?0:parseInt(v,10)||0); }}
      style={style} {...props}/>
  );
};

const SrcBadge = ({source, color}) => {
  const c = color || "#6b7280";
  return <span style={{background:c+"18",color:c,border:`1px solid ${c}40`,borderRadius:999,padding:"1px 7px",fontSize:10,fontWeight:700}}>{source}</span>;
};

// ── 메인 앱 ─────────────────────────────────────────────────
function App() {
  const [adminKey, setAdminKey]         = useState(() => localStorage.getItem(ADMIN_KEY_KEY) || "");
  const [keyInput, setKeyInput]         = useState("");
  const [authenticated, setAuthenticated] = useState(() => Boolean(localStorage.getItem(ADMIN_KEY_KEY)));

  const [settings, setSettings] = useState(() => {
    try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}") }; }
    catch { return DEFAULT_SETTINGS; }
  });

  const [shows, setShows]             = useState([]);
  const [presets, setPresets]         = useState([]);
  const [data, setData]               = useState({});
  const [activeShow, setActiveShow]   = useState(null);
  const [loading, setLoading]         = useState(false);
  const [syncStatus, setSyncStatus]   = useState("idle");
  const [showSettings, setShowSettings]       = useState(false);
  const [showAddModal, setShowAddModal]       = useState(false);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText]   = useState("");
  const [importResult, setImportResult] = useState(null);
  const [fileLoading, setFileLoading] = useState(false);
  const [newRow, setNewRow]           = useState({name:"",phone:"",type:"",qty:1,amount:0,source:"직접",onSite:false,sendAlim:false});
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const refreshTimerRef = useRef(null);
  const settingsRef = useRef(settings);

  // ── 데이터 로드 ──────────────────────────────────────────
  const fetchAll = useCallback(async (key) => {
    setSyncStatus("syncing");
    try {
      const res = await fetch('/api/admin', { headers: { 'x-admin-key': key } });
      if (res.status === 401) { setSyncStatus("error"); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      const { reservations, sessions, presets: ps, performance, seatAlloc: redisSeatAlloc } = json;
      setPresets(ps || []);

      // admin 공연명 자동 연동
      if (performance?.name) {
        setSettings(prev => {
          if (prev.showTitle === performance.name) return prev;
          const next = { ...prev, showTitle: performance.name };
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(next));
          return next;
        });
      }

      const newShows = sortSessions((sessions || []).map(s => ({
        id: s.id, label: sessLabel(s), time: s.time || '', date: s.date || '', seats: s.seats || 0,
      })));
      setShows(newShows);

      const grouped = {};
      (reservations || []).forEach(r => {
        const sid = r.sessionId;
        if (!sid) return;
        if (!grouped[sid]) grouped[sid] = [];
        grouped[sid].push({
          id:           r.resNum,
          show_id:      r.sessionId,
          name:         r.name,
          phone:        r.phone || '-',
          type:         r.ticketType || '일반',
          qty:          r.quantity   || 1,
          amount:       r.total      || 0,
          source:       r.source     || '직접',
          cancelled:    r.payStatus === '관리자취소',
          checked_in:   r.checkedIn  || false,
          checked_in_at:r.checkedInAt,
          payStatus:    r.payStatus,
          unitPrice:    r.unitPrice  || 0,
        });
      });
      setData(grouped);
      setSyncStatus("ok");
      setActiveShow(prev => {
        if (prev) return prev;
        return newShows.length > 0 ? newShows[0].id : null;
      });

      // seatAlloc: Redis 데이터 기준으로 merge, 새 회차 자동 초기화
      const currentSources = settingsRef.current.sources || DEFAULT_SETTINGS.sources;
      const baseAlloc = redisSeatAlloc || settingsRef.current.seatAlloc || {};
      const alloc = { ...baseAlloc };
      let allocChanged = false;
      newShows.forEach(s => {
        if (!alloc[s.id]) {
          const entry = {};
          currentSources.forEach(src => {
            entry[src.name] = src.name === '직접' ? (s.seats || 0) : 0;
          });
          alloc[s.id] = entry;
          allocChanged = true;
        } else {
          const directSeats = s.seats || 0;
          if ((alloc[s.id]['직접'] ?? -1) !== directSeats) {
            alloc[s.id] = { ...alloc[s.id], '직접': directSeats };
            allocChanged = true;
          }
        }
      });
      setSettings(prev => {
        const next = { ...prev, seatAlloc: alloc };
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(next));
        return next;
      });
      if (allocChanged) {
        try {
          await fetch('/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-key': key },
            body: JSON.stringify({ action: 'saveSeatAlloc', seatAlloc: alloc }),
          });
        } catch(e) { console.error('seatAlloc Redis 저장 오류:', e.message); }
      }
    } catch(e) {
      console.error(e);
      setSyncStatus("error");
    }
    setLoading(false);
  }, []);

  useEffect(() => { settingsRef.current = settings; }, [settings]);

  useEffect(() => {
    if (!authenticated || !adminKey) return;
    setLoading(true);
    fetchAll(adminKey);
    clearInterval(refreshTimerRef.current);
    refreshTimerRef.current = setInterval(() => fetchAll(adminKey), 30000);
    return () => clearInterval(refreshTimerRef.current);
  }, [authenticated, adminKey, fetchAll]);

  // ── Admin Key 로그인 ─────────────────────────────────────
  const handleLogin = () => {
    const k = keyInput.trim();
    if (!k) return;
    localStorage.setItem(ADMIN_KEY_KEY, k);
    setAdminKey(k);
    setAuthenticated(true);
  };

  // ── API 공통 POST ────────────────────────────────────────
  const apiPost = async (body) => {
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    return res.json();
  };

  // ── 입장 처리 (토글) ─────────────────────────────────────
  const toggleCheckIn = async (r) => {
    const newVal = !r.checked_in;
    setSyncStatus("syncing");
    try {
      await apiPost({ action: 'checkIn', resNum: r.id, checked: newVal });
      setSyncStatus("ok");
      setData(d => {
        const nd = { ...d };
        Object.keys(nd).forEach(sid => {
          nd[sid] = nd[sid].map(x => x.id === r.id
            ? { ...x, checked_in: newVal, checked_in_at: newVal ? new Date().toISOString() : null }
            : x);
        });
        return nd;
      });
    } catch(e) { setSyncStatus("error"); alert("입장 처리 실패: " + e.message); }
  };

  // ── 입금 확인 ─────────────────────────────────────────────
  const confirmPayment = async (r) => {
    if (!confirm(`[${r.name}] 입금을 확인하고 티켓 알림톡을 발송하시겠습니까?`)) return;
    setSyncStatus("syncing");
    try {
      await apiPost({ action: 'confirmPayment', resNum: r.id });
      setSyncStatus("ok");
      setData(d => {
        const nd = { ...d };
        Object.keys(nd).forEach(sid => {
          nd[sid] = nd[sid].map(x => x.id === r.id ? { ...x, payStatus: '입금확인' } : x);
        });
        return nd;
      });
    } catch(e) { setSyncStatus("error"); alert("입금 확인 실패: " + e.message); }
  };

  // ── 현장결제 취소 (알림톡 없음) ──────────────────────────
  const cancelOnSite = async (r) => {
    if (!window.confirm(`[${r.name}] 현장결제 예약을 취소하시겠습니까?\n알림톡은 발송되지 않습니다.`)) return;
    setSyncStatus("syncing");
    try {
      await apiPost({ action: 'cancel', resNum: r.id, silent: true });
      setSyncStatus("ok");
      setData(d => {
        const nd = { ...d };
        Object.keys(nd).forEach(sid => {
          nd[sid] = nd[sid].map(x => x.id === r.id ? { ...x, cancelled: true, payStatus: '관리자취소' } : x);
        });
        return nd;
      });
    } catch(e) { setSyncStatus("error"); alert("취소 실패: " + e.message); }
  };

  // ── 예약 추가 ─────────────────────────────────────────────
  const addReservation = async () => {
    const { name, phone, type, qty, amount, source, onSite, sendAlim } = newRow;
    if (!name.trim()) return;
    const showInfo = shows.find(s => s.id === activeShow);
    setSyncStatus("syncing");
    try {
      const unitPrice = qty > 0 ? Math.round(amount / qty) : 0;
      await apiPost({
        action: 'addManualReservation',
        name, phone, sessionId: activeShow,
        sessionLabel: showInfo?.label || '',
        ticketType: type || (presets[0]?.name || '일반'),
        quantity: qty, unitPrice, total: amount,
        onSite, sendAlim: sendAlim && !onSite,
      });
      setSyncStatus("ok");
      setShowAddModal(false);
      setNewRow({name:"",phone:"",type:"",qty:1,amount:0,source:"직접",onSite:false,sendAlim:false});
      fetchAll(adminKey);
    } catch(e) { setSyncStatus("error"); alert("예약 추가 실패: " + e.message); }
  };

  // ── 예약 삭제 (취소된 건만) ──────────────────────────────
  const deleteRow = async (id) => {
    setSyncStatus("syncing");
    try {
      await apiPost({ action: 'deleteReservation', resNum: id });
      setSyncStatus("ok");
      setData(d => {
        const nd = { ...d };
        Object.keys(nd).forEach(sid => { nd[sid] = nd[sid].filter(r => r.id !== id); });
        return nd;
      });
      setDeleteConfirm(null);
    } catch(e) { setSyncStatus("error"); alert("삭제 실패: " + e.message); }
  };

  // ── findShowId (파서용) ───────────────────────────────────
  const findShowId = (dateRaw) => {
    if (!dateRaw) return null;
    const clean = dateRaw.replace(/\s/g, "");
    for (const s of shows) {
      const m = s.label.match(/(\d+)월\s*(\d+)일/);
      if (m) {
        const mo = m[1], da = m[2];
        const moPad = mo.padStart(2,"0"), daPad = da.padStart(2,"0");
        if (clean.includes(`${mo}월${da}일`) || clean.includes(`${moPad}월${daPad}일`)) return s.id;
        if (clean.includes(`.${mo}.${da}.`)) return s.id;
      }
      if (s.date) {
        const d = new Date(s.date);
        const mo = String(d.getMonth()+1), da = String(d.getDate());
        const moPad = mo.padStart(2,"0"), daPad = da.padStart(2,"0");
        if (clean.includes(`${mo}월${da}일`) || clean.includes(`${moPad}월${daPad}일`)) return s.id;
        if (clean.includes(`.${mo}.${da}.`)) return s.id;
      }
    }
    return null;
  };

  const guessType = (amt) => {
    if (amt===0)     return "초대권";
    if (amt===30000) return "일반";
    if (amt===27000) return "삼일로창고극장 맴버쉽 할인";
    if (amt===24000) return "페스티벌 패키지 할인";
    if (amt===21000) return "장애인 할인";
    if (amt===15000) return "예술인패스";
    return "일반";
  };

  // ── 파서 ─────────────────────────────────────────────────
  const parseRows = (headers, rowObjs) => {
    const allIds    = new Set(Object.values(data).flat().map(r => r.id));
    const toUpsert  = [], cancelledList = [], updatedList = [], skipped = [], addedByShow = {};
    shows.forEach(s => addedByShow[s.id] = []);

    const isNaver     = headers.includes("예약번호") && headers.includes("이용일시");
    const isDirect    = headers.includes("예약번호") && headers.includes("회차");
    const isInterpark = headers.includes("이용관람일") || headers.includes("대표티켓번호");

    const seenInterparkIds = new Set();
    const interparkShowIds = new Set();

    for (const row of rowObjs) {
      const get = k => (row[k]??'').toString().trim();
      let id, name, phone, statusRaw="", dateRaw="", typeLabel, qty, amount, source;

      if (isNaver) {
        id=get("예약번호"); name=get("예매자"); phone=get("전화번호");
        statusRaw=get("상태"); dateRaw=get("이용일시"); source="네이버";
        const g1=parseInt(get("가격분류1-일반"))||0, g2=parseInt(get("가격분류2-페스티벌 패키지 할인"))||0;
        const g3=parseInt(get("가격분류3-삼일로창고극장 맴버쉽 할인"))||0, g4=parseInt(get("가격분류4-예술인패스"))||0;
        qty=g1+g2+g3+g4||1; amount=parseInt(get("실결제금액"))||0;
        if (g1>0) typeLabel="일반"; else if (g2>0) typeLabel="페스티벌 패키지 할인";
        else if (g3>0) typeLabel="삼일로창고극장 맴버쉽 할인"; else typeLabel="예술인패스";
      } else if (isDirect) {
        id=get("예약번호"); name=get("이름"); phone=get("연락처");
        statusRaw=get("입금상태"); dateRaw=get("회차");
        typeLabel=get("예매유형"); qty=parseInt(get("매수"))||1;
        amount=parseInt(get("결제금액"))||0; source="직접";
        if (statusRaw==="관리자취소") { skipped.push(name+" (관리자취소)"); continue; }
      } else if (isInterpark) {
        id=get("대표티켓번호").replace(/-\[.*\]/,"");
        name=get("예매자명"); phone="-"; dateRaw=get("이용관람일");
        qty=parseInt(get("매수"))||1;
        amount=parseInt(get("금액").replace(/,/g,""))||0;
        typeLabel=guessType(Math.round(amount/qty)); source="인터파크";
        statusRaw=get("취소여부")||get("상태")||get("예매상태")||"";
      } else continue;

      if (!name||!id) continue;
      const showId = findShowId(dateRaw);

      if (isInterpark) {
        seenInterparkIds.add(id);
        if (showId) interparkShowIds.add(showId);
      }

      const isCancelled = (isNaver && statusRaw==="취소") ||
                          (isInterpark && (statusRaw==="Y" || statusRaw==="취소" || statusRaw==="취소완료"));

      if (isCancelled) {
        const existing = Object.values(data).flat().find(r => r.id === id);
        if (existing && !existing.cancelled) {
          toUpsert.push({ ...existing, cancelled: true });
          cancelledList.push(name + " (취소)");
        } else if (!existing && showId) {
          toUpsert.push({ id, show_id:showId, name, phone, type:typeLabel||"예술인패스", qty, amount, source, cancelled:true });
          cancelledList.push(name + " (취소기록추가)");
        } else if (existing && existing.cancelled) {
          skipped.push(name + " (이미취소)");
        } else {
          skipped.push(name + " (날짜불명-취소)");
        }
        continue;
      }

      if (!showId) { skipped.push(name + " (날짜불명)"); continue; }

      if (allIds.has(id)) {
        const existing = Object.values(data).flat().find(x => x.id === id);
        if (existing) {
          let changed = false;
          const updates = { ...existing };
          if (existing.qty    !== qty)                       { updates.qty    = qty;       changed = true; }
          if (existing.amount !== amount)                    { updates.amount = amount;    changed = true; }
          if (existing.type   !== typeLabel && typeLabel)    { updates.type   = typeLabel; changed = true; }
          if (changed) {
            toUpsert.push(updates);
            const changes = [];
            if (existing.qty    !== qty)                    changes.push(`${existing.qty}매→${qty}매`);
            if (existing.amount !== amount)                 changes.push(`${existing.amount.toLocaleString()}→${amount.toLocaleString()}원`);
            if (existing.type   !== typeLabel && typeLabel) changes.push(`${existing.type}→${typeLabel}`);
            updatedList.push(name + " (" + changes.join(", ") + ")");
          } else {
            skipped.push(name + " (중복)");
          }
        } else {
          skipped.push(name + " (중복)");
        }
        continue;
      }

      const entry = { id, show_id:showId, name, phone, type:typeLabel, qty, amount, source, cancelled:false };
      toUpsert.push(entry);
      addedByShow[showId].push(entry);
      allIds.add(id);
    }

    // 인터파크 reconciliation
    if (isInterpark && interparkShowIds.size > 0) {
      for (const showId of interparkShowIds) {
        for (const ex of (data[showId]||[]).filter(r => r.source==="인터파크" && !r.cancelled)) {
          if (!seenInterparkIds.has(ex.id) && !toUpsert.find(r => r.id === ex.id)) {
            toUpsert.push({ ...ex, cancelled: true });
            cancelledList.push(ex.name + " (취소)");
          }
        }
      }
    }

    return { toUpsert, addedByShow, cancelledList, updatedList, skipped,
             totalAdded: Object.values(addedByShow).reduce((s,a) => s + a.length, 0) };
  };

  const runParse = async (headers, rowObjs) => {
    const result = parseRows(headers, rowObjs);
    if (result.toUpsert.length > 0) {
      const res = await fetch('/api/roster-import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ rows: result.toUpsert }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      // 로컬 state 즉시 반영
      const newData = JSON.parse(JSON.stringify(data));
      result.toUpsert.forEach(r => {
        if (!newData[r.show_id]) newData[r.show_id] = [];
        const idx = newData[r.show_id].findIndex(x => x.id === r.id);
        if (idx >= 0) newData[r.show_id][idx] = r; else newData[r.show_id].push(r);
      });
      setData(newData);
    }
    setImportResult(result);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setFileLoading(true); setImportResult(null);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const wb   = XLSX.read(ev.target.result, { type:"array", codepage:949 });
        const sheet= wb.Sheets[wb.SheetNames[0]];
        const raw  = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"" });
        const HEADER_MARKERS = ["예약번호","이용관람일","대표티켓번호","No"];
        let headerRowIdx = raw.findIndex(row =>
          Array.isArray(row) && HEADER_MARKERS.some(m => row.some(cell => String(cell).includes(m)))
        );
        if (headerRowIdx < 0) headerRowIdx = 0;
        const headers = raw[headerRowIdx].map(h => String(h).trim());
        const rowObjs = raw.slice(headerRowIdx + 1)
          .filter(row => row.some(c => c !== ""))
          .map(row => { const obj={}; headers.forEach((h,i) => obj[h]=String(row[i]??'').trim()); return obj; });
        if (rowObjs.length) await runParse(headers, rowObjs);
      } catch(err) { alert("파일 오류: " + err.message); }
      setFileLoading(false); e.target.value = "";
    };
    reader.readAsArrayBuffer(file);
  };

  const parseImport = async () => {
    const lines = importText.trim().split("\n").filter(l => l.trim());
    if (!lines.length) return;
    const HEADER_MARKERS = ["예약번호","이용관람일","대표티켓번호"];
    let headerIdx = lines.findIndex(l => HEADER_MARKERS.some(m => l.includes(m)));
    if (headerIdx < 0) headerIdx = 0;
    const headers = lines[headerIdx].split("\t").map(h => h.trim());
    const rowObjs = lines.slice(headerIdx + 1).map(line => {
      const cols = line.split("\t"); const obj = {};
      headers.forEach((h,i) => obj[h] = (cols[i]||"").trim());
      return obj;
    });
    await runParse(headers, rowObjs);
  };

  // ── 집계 ─────────────────────────────────────────────────
  const rows         = data[activeShow] || [];
  const activeRows   = rows.filter(r => !r.cancelled);
  const totalPeople  = activeRows.reduce((s,r) => s + r.qty, 0);
  const totalAmount  = activeRows.reduce((s,r) => s + r.amount, 0);
  const showInfo     = shows.find(s => s.id === activeShow);
  const alloc        = settings.seatAlloc?.[activeShow] || {};
  const allocTotal   = Object.values(alloc).reduce((s,v) => s + v, 0);
  const totalSeats   = allocTotal || settings.totalSeats;
  const remaining    = totalSeats - totalPeople;
  const pct          = Math.min(100, Math.round(totalSeats > 0 ? (totalPeople / totalSeats) * 100 : 0));
  const checkedInCount = activeRows.reduce((s,r) => s + (r.checked_in ? r.qty : 0), 0);
  const sources      = settings.sources || DEFAULT_SETTINGS.sources;
  const srcColorMap  = Object.fromEntries(sources.map(s => [s.name, s.color]));
  const syncDot      = syncStatus==="syncing"?"🔄":syncStatus==="ok"?"🟢":syncStatus==="error"?"🔴":"⚪";

  const typeOptions  = presets.filter(p => p.active).map(p => p.name);
  const allTypePresets = presets; // 비활성 포함 전체 권종

  // ── Admin Key 입력 화면 ───────────────────────────────────
  if (!authenticated) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f3f4f6",padding:24}}>
      <div style={{background:"#fff",borderRadius:16,padding:32,maxWidth:400,width:"100%",boxShadow:"0 4px 24px #0002",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:16}}>🎭</div>
        <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>예약 인원부</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:24}}>Admin Key를 입력하세요</div>
        <input
          type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          placeholder="Admin Key"
          style={{width:"100%",border:"1px solid #d1d5db",borderRadius:8,padding:"10px 14px",fontSize:14,marginBottom:12}}
          autoFocus/>
        <button onClick={handleLogin} style={{width:"100%",background:"#1e293b",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:15,cursor:"pointer",fontWeight:700}}>
          입장
        </button>
      </div>
    </div>
  );

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f3f4f6",flexDirection:"column",gap:12}}>
      <div style={{fontSize:32}}>🔄</div>
      <div style={{color:"#6b7280",fontSize:14}}>데이터 불러오는 중...</div>
    </div>
  );

  return (
    <div style={{fontFamily:"Arial,sans-serif",background:"#f3f4f6",minHeight:"100vh"}}>

      {/* 헤더 */}
      <div style={{background:"#1e293b",color:"#fff",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:17,fontWeight:700}}>🎭 {settings.showTitle||"예약 인원부"}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
            {settings.festivalName} | 총 객석 {totalSeats}석
            <span style={{marginLeft:8}}>{syncDot} {syncStatus==="syncing"?"동기화중":syncStatus==="ok"?"연결됨":syncStatus==="error"?"연결오류":""}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>fetchAll(adminKey)}
            style={{background:"#334155",color:"#cbd5e1",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer"}}>
            🔄 새로고침
          </button>
          <button onClick={()=>setShowSettings(true)}
            style={{background:"#334155",color:"#cbd5e1",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer"}}>
            ⚙️ 설정
          </button>
        </div>
      </div>

      {/* 회차 탭 */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",display:"flex",overflowX:"auto"}}>
        {shows.map(s => {
          const cnt = (data[s.id]||[]).filter(r=>!r.cancelled).reduce((sum,r)=>sum+r.qty,0);
          const sAllocTotal = Object.values(settings.seatAlloc?.[s.id]||{}).reduce((sum,v)=>sum+v,0);
          const sSeats = sAllocTotal || settings.totalSeats;
          const isActive = s.id === activeShow;
          return (
            <button key={s.id} onClick={()=>setActiveShow(s.id)} style={{
              padding:"11px 18px",border:"none",cursor:"pointer",fontFamily:"Arial",
              borderBottom:isActive?"3px solid #1e293b":"3px solid transparent",
              background:"transparent",color:isActive?"#1e293b":"#6b7280",
              fontWeight:isActive?700:400,fontSize:13,whiteSpace:"nowrap",lineHeight:1.6,
            }}>
              {s.label} {s.time}<br/>
              <span style={{fontSize:11,color:cnt>=sSeats?"#e02424":"#6b7280"}}>{cnt}/{sSeats}석</span>
            </button>
          );
        })}
        {shows.length === 0 && (
          <div style={{padding:"14px 20px",fontSize:13,color:"#9ca3af"}}>Redis에 등록된 회차가 없습니다</div>
        )}
      </div>

      <div style={{maxWidth:1080,margin:"0 auto",padding:"18px 16px"}}>

        {/* 현황 카드 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
          {[
            {label:"예약 인원",  value:totalPeople+"명",                  color:"#1a56db"},
            {label:"입장 완료",  value:checkedInCount+"명",               color:"#0e9f6e"},
            {label:"잔여 좌석",  value:remaining+"석",                    color:remaining<=5?"#e02424":"#64748b"},
            {label:"점유율",     value:pct+"%",                           color:"#7e3af2"},
            {label:"결제 총액",  value:totalAmount.toLocaleString()+"원", color:"#e3a008"},
          ].map(c=>(
            <div key={c.label} style={{background:"#fff",borderRadius:10,padding:"12px 14px",boxShadow:"0 1px 3px #0001"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{c.label}</div>
              <div style={{fontSize:19,fontWeight:700,color:c.color}}>{c.value}</div>
            </div>
          ))}
        </div>

        {/* 점유율 바 + 판매처별 현황 */}
        <div style={{background:"#fff",borderRadius:10,padding:"14px 16px",marginBottom:14,boxShadow:"0 1px 3px #0001"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280",marginBottom:5}}>
            <span>전체 좌석 점유율</span><span>{totalPeople} / {totalSeats}</span>
          </div>
          <div style={{background:"#f3f4f6",borderRadius:999,height:8,marginBottom:14}}>
            <div style={{width:pct+"%",background:pct>=90?"#e02424":pct>=70?"#e3a008":"#1a56db",borderRadius:999,height:8,transition:"width 0.4s"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {sources.map(({name:src, color:c}) => {
              const sold      = activeRows.filter(r=>r.source===src).reduce((s,r)=>s+r.qty,0);
              const allocated = alloc[src] || 0;
              const remain    = allocated - sold;
              const usePct    = allocated > 0 ? Math.min(100, Math.round(sold/allocated*100)) : 0;
              return (
                <div key={src} style={{background:"#f9fafb",borderRadius:8,padding:"10px 12px",border:"1px solid #f3f4f6"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <span style={{fontSize:12,fontWeight:700,color:c}}>{src}</span>
                    <span style={{fontSize:11,color:"#6b7280"}}>{sold}/{allocated}석</span>
                  </div>
                  <div style={{background:"#e5e7eb",borderRadius:999,height:5}}>
                    <div style={{width:usePct+"%",background:c,borderRadius:999,height:5}}/>
                  </div>
                  <div style={{fontSize:11,color:remain<0?"#e02424":"#9ca3af",marginTop:4}}>
                    {remain<0?`초과 ${Math.abs(remain)}석`:`잔여 ${remain}석`}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 액션 버튼 */}
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <button onClick={()=>{
            const firstType = presets.find(p=>p.active) || presets[0];
            setNewRow({name:"",phone:"",type:firstType?.name||"",qty:1,amount:firstType?.price||0,source:"직접",onSite:false,sendAlim:false});
            setShowAddModal(true);
          }}
            style={{background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:600}}>
            + 예약 추가
          </button>
          <label style={{background:"#fff",color:"#1e293b",border:"1px solid #d1d5db",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            {fileLoading?"⏳ 읽는 중...":"📂 파일 업로드 (XLS/CSV)"}
            <input type="file" accept=".xls,.xlsx,.csv" onChange={handleFileUpload} style={{display:"none"}} disabled={fileLoading}/>
          </label>
          <button onClick={()=>{setShowImportModal(true);setImportText("");setImportResult(null);}}
            style={{background:"#fff",color:"#1e293b",border:"1px solid #d1d5db",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer"}}>
            📋 붙여넣기 업데이트
          </button>
        </div>

        {/* 업데이트 결과 */}
        {importResult && !showImportModal && (
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:12,marginBottom:14,fontSize:12}}>
            <div style={{fontWeight:700,color:"#15803d",marginBottom:5}}>
              ✅ {importResult.totalAdded}건 추가 / {importResult.cancelledList?.length||0}건 취소 / {importResult.updatedList?.length||0}건 수정
            </div>
            {shows.map(s => importResult.addedByShow[s.id]?.length > 0 && (
              <div key={s.id} style={{color:"#166534",marginBottom:2}}>
                <b>{s.label}:</b> {importResult.addedByShow[s.id].map(r=>r.name+`(${r.qty}매)`).join(", ")}
              </div>
            ))}
            {importResult.cancelledList?.length>0&&<div style={{color:"#92400e",marginTop:3}}><b>취소:</b> {importResult.cancelledList.join(", ")}</div>}
            {importResult.updatedList?.length>0&&<div style={{color:"#1d4ed8",marginTop:3}}><b>수정:</b> {importResult.updatedList.join(", ")}</div>}
            {importResult.skipped?.length>0&&<div style={{color:"#9ca3af",marginTop:3}}><b>건너뜀:</b> {importResult.skipped.join(", ")}</div>}
            <button onClick={()=>setImportResult(null)} style={{marginTop:6,fontSize:11,color:"#6b7280",background:"none",border:"none",cursor:"pointer"}}>닫기 ×</button>
          </div>
        )}

        {/* 예약 테이블 */}
        <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 3px #0001",overflow:"hidden"}}>
          <div style={{padding:"13px 16px",borderBottom:"1px solid #f3f4f6",fontWeight:700,fontSize:14,color:"#1e293b"}}>
            {showInfo?.label} {showInfo?.time} — 예약 목록 ({rows.length}건 / 취소 {rows.filter(r=>r.cancelled).length}건)
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#f9fafb",color:"#6b7280",fontSize:11}}>
                  {["#","예약번호","출처","예매자","연락처","예매유형","매수","결제금액","결제","입장",""].map((h,i)=>(
                    <th key={i} style={{padding:"9px 12px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r, idx) => {
                  const rowBg = r.cancelled ? "#fef2f2" : r.checked_in ? "#f0fdf4" : "";
                  const rowHover = r.cancelled ? "#fee2e2" : r.checked_in ? "#dcfce7" : "#f9fafb";
                  const canConfirmPay = !r.cancelled && (r.payStatus === '미입금' || r.payStatus === '현장결제예정');
                  return (
                    <tr key={r.id} style={{borderTop:"1px solid #f3f4f6",background:rowBg}}
                      onMouseEnter={e=>e.currentTarget.style.background=rowHover}
                      onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                      <td style={{padding:"9px 12px",color:"#9ca3af"}}>{idx+1}</td>
                      <td style={{padding:"9px 12px",color:"#6b7280",fontSize:11}}>{r.id}</td>
                      <td style={{padding:"9px 12px"}}><SrcBadge source={r.source} color={srcColorMap[r.source]}/></td>
                      <td style={{padding:"9px 12px",fontWeight:600,color:r.cancelled?"#9ca3af":"",textDecoration:r.cancelled?"line-through":""}}>
                        {r.name}
                        {r.payStatus==='현장결제예정'&&<span style={{fontSize:10,marginLeft:4,color:"#1d4ed8",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:4,padding:"0 4px"}}>현장</span>}
                      </td>
                      <td style={{padding:"9px 12px",color:"#6b7280"}}>{r.phone}</td>
                      <td style={{padding:"9px 12px"}}>
                        {r.cancelled
                          ? <span style={{background:"#fee2e2",color:"#e02424",border:"1px solid #fca5a5",borderRadius:999,padding:"1px 8px",fontSize:11,fontWeight:700}}>취소</span>
                          : <Pill type={r.type}/>}
                      </td>
                      <td style={{padding:"9px 12px",fontWeight:700,color:r.cancelled?"#9ca3af":"#1e293b",textAlign:"center",textDecoration:r.cancelled?"line-through":""}}>{r.qty}</td>
                      <td style={{padding:"9px 12px",color:r.cancelled?"#9ca3af":r.amount===0?"#9ca3af":"#1e293b",textDecoration:r.cancelled?"line-through":""}}>
                        {r.cancelled?"환불":r.amount===0?"무료":r.amount.toLocaleString()+"원"}
                      </td>
                      {/* 결제 상태 + 입금확인 버튼 */}
                      <td style={{padding:"9px 8px",whiteSpace:"nowrap"}}>
                        {canConfirmPay ? (
                          <button onClick={()=>confirmPayment(r)}
                            style={{
                              background: r.payStatus==='현장결제예정' ? "#eff6ff" : "#fff7ed",
                              color:      r.payStatus==='현장결제예정' ? "#1d4ed8"  : "#c2410c",
                              border:     r.payStatus==='현장결제예정' ? "1px solid #bfdbfe" : "1px solid #fed7aa",
                              borderRadius:7, padding:"4px 10px", fontSize:11,
                              cursor:"pointer", fontWeight:700, whiteSpace:"nowrap",
                            }}>
                            💳 입금확인
                          </button>
                        ) : (
                          <PayBadge payStatus={r.payStatus}/>
                        )}
                      </td>
                      {/* 입장 버튼 */}
                      <td style={{padding:"9px 8px",textAlign:"center"}}>
                        {!r.cancelled && (
                          <button onClick={()=>toggleCheckIn(r)}
                            title={r.checked_in?"입장취소":"입장처리"}
                            style={{
                              background: r.checked_in?"#dcfce7":"#f3f4f6",
                              color:      r.checked_in?"#16a34a":"#9ca3af",
                              border:     r.checked_in?"1px solid #86efac":"1px solid #e5e7eb",
                              borderRadius:8, padding:"5px 10px", fontSize:12,
                              cursor:"pointer", fontWeight:r.checked_in?700:400, whiteSpace:"nowrap",
                            }}>
                            {r.checked_in?"✅ 입장":"입장"}
                          </button>
                        )}
                      </td>
                      {/* 취소 / 삭제 */}
                      <td style={{padding:"9px 12px"}}>
                        {r.payStatus === '현장결제예정' && !r.cancelled && (
                          <button onClick={()=>cancelOnSite(r)}
                            style={{color:"#c2410c",border:"1px solid #fed7aa",background:"#fff7ed",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>
                            취소
                          </button>
                        )}
                        {r.cancelled && (
                          deleteConfirm === r.id ? (
                            <span>
                              <button onClick={()=>deleteRow(r.id)} style={{color:"#e02424",border:"none",background:"none",cursor:"pointer",fontSize:12,fontWeight:700}}>삭제</button>
                              <button onClick={()=>setDeleteConfirm(null)} style={{color:"#6b7280",border:"none",background:"none",cursor:"pointer",fontSize:12,marginLeft:4}}>취소</button>
                            </span>
                          ) : (
                            <button onClick={()=>setDeleteConfirm(r.id)} style={{color:"#d1d5db",border:"none",background:"none",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
                          )
                        )}
                      </td>
                    </tr>
                  );
                })}
                {rows.length===0&&<tr><td colSpan={11} style={{padding:32,textAlign:"center",color:"#9ca3af"}}>예약이 없습니다</td></tr>}
                {rows.length>0&&(
                  <tr style={{background:"#f9fafb",borderTop:"2px solid #e5e7eb",fontWeight:700}}>
                    <td colSpan={6} style={{padding:"9px 12px",color:"#6b7280",fontSize:12}}>합계 <span style={{fontWeight:400,color:"#9ca3af"}}>(취소 제외)</span></td>
                    <td style={{padding:"9px 12px",textAlign:"center"}}>{totalPeople}</td>
                    <td style={{padding:"9px 12px"}}>{totalAmount.toLocaleString()}원</td>
                    <td/>
                    <td style={{padding:"9px 12px",textAlign:"center",fontSize:12,color:"#16a34a",fontWeight:600}}>{checkedInCount}명 입장</td>
                    <td/>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* 설정 모달 */}
      {showSettings && <SettingsModal settings={settings} adminKey={adminKey} shows={shows}
        onSave={async (s, newKey) => {
          setSettings(s);
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
          const keyToUse = (newKey && newKey !== adminKey) ? newKey : adminKey;
          if (newKey && newKey !== adminKey) {
            localStorage.setItem(ADMIN_KEY_KEY, newKey);
            setAdminKey(newKey);
          }
          try {
            await fetch('/api/admin', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-admin-key': keyToUse },
              body: JSON.stringify({ action: 'saveSeatAlloc', seatAlloc: s.seatAlloc || {} }),
            });
          } catch(e) { console.error('seatAlloc Redis 저장 오류:', e.message); }
          setShowSettings(false);
        }}
        onClose={()=>setShowSettings(false)}/>}

      {/* 예약 추가 모달 */}
      {showAddModal && (
        <div style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:12,padding:24,width:380,boxShadow:"0 8px 32px #0003",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>예약 추가 — {showInfo?.label}</div>
            {/* 이름 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>예매자 이름 *</div>
              <input value={newRow.name} onChange={e=>setNewRow(p=>({...p,name:e.target.value}))}
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
            </div>
            {/* 연락처 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>연락처</div>
              <input value={newRow.phone} onChange={e=>setNewRow(p=>({...p,phone:formatPhone(e.target.value)}))}
                placeholder="010-0000-0000" inputMode="numeric"
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
            </div>
            {/* 예매유형 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>예매유형</div>
              {allTypePresets.length > 0 ? (
                <select value={newRow.type||(typeOptions[0]||allTypePresets[0]?.name||"")} onChange={e=>{
                  const t = e.target.value;
                  const preset = presets.find(p=>p.name===t);
                  setNewRow(p=>({...p, type:t, amount: preset ? (preset.price||0)*p.qty : p.amount}));
                }}
                  style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}>
                  {allTypePresets.filter(p=>p.active).length > 0 && (
                    <optgroup label="활성">
                      {allTypePresets.filter(p=>p.active).map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
                    </optgroup>
                  )}
                  {allTypePresets.filter(p=>!p.active).length > 0 && (
                    <optgroup label="비활성">
                      {allTypePresets.filter(p=>!p.active).map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
                    </optgroup>
                  )}
                </select>
              ) : (
                <input value={newRow.type} onChange={e=>setNewRow(p=>({...p,type:e.target.value}))}
                  placeholder="일반"
                  style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
              )}
            </div>
            {/* 매수 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>매수</div>
              <NumInput value={newRow.qty} onChange={v=>{
                const preset = presets.find(p=>p.name===(newRow.type||typeOptions[0]||allTypePresets[0]?.name));
                setNewRow(p=>({...p, qty:v, amount: preset ? (preset.price||0)*v : p.amount}));
              }} min={1}
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
            </div>
            {/* 결제금액 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>결제금액 (원) <span style={{fontSize:11,color:"#9ca3af"}}>— 권종 선택 시 자동 계산</span></div>
              <NumInput value={newRow.amount} onChange={v=>setNewRow(p=>({...p,amount:v}))}
                style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13}}/>
            </div>
            {/* 현장결제 예정 */}
            <div style={{marginBottom:12,padding:"10px 12px",background:"#eff6ff",borderRadius:8,border:"1px solid #bfdbfe"}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
                <input type="checkbox" checked={newRow.onSite} onChange={e=>setNewRow(p=>({...p,onSite:e.target.checked,sendAlim:e.target.checked?false:p.sendAlim}))}
                  style={{width:16,height:16}}/>
                <span style={{fontWeight:600,color:"#1d4ed8"}}>💳 현장결제 예정</span>
              </label>
              <div style={{fontSize:11,color:"#6b7280",marginTop:4,marginLeft:24}}>현장에서 결제 예정 — 인원부에 기록 후 당일 입금확인 버튼으로 처리</div>
            </div>
            {/* 알림톡 발송 */}
            {!newRow.onSite && (
              <div style={{marginBottom:16}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
                  <input type="checkbox" checked={newRow.sendAlim} onChange={e=>setNewRow(p=>({...p,sendAlim:e.target.checked}))}
                    style={{width:16,height:16}}/>
                  <span>티켓 알림톡 발송</span>
                </label>
              </div>
            )}
            {newRow.onSite && (
              <div style={{marginBottom:16,fontSize:12,color:"#9ca3af"}}>
                ※ 현장결제 예정은 알림톡이 발송되지 않습니다.
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={addReservation}
                style={{flex:1,background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:10,fontWeight:700,cursor:"pointer"}}>
                추가
              </button>
              <button onClick={()=>setShowAddModal(false)}
                style={{flex:1,background:"#f3f4f6",color:"#1e293b",border:"none",borderRadius:8,padding:10,cursor:"pointer"}}>
                취소
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 붙여넣기 모달 */}
      {showImportModal && (
        <div style={{position:"fixed",inset:0,background:"#0008",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:12,padding:24,width:520,maxWidth:"95vw",boxShadow:"0 8px 32px #0003"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>📋 예약 데이터 붙여넣기</div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>
              네이버 예약 목록, 인터파크 예매자별현황을 헤더 포함 전체 복사 후 붙여넣으세요.
            </div>
            {!importResult ? (
              <>
                <textarea value={importText} onChange={e=>setImportText(e.target.value)}
                  placeholder="여기에 붙여넣기 (Ctrl+V / Cmd+V)..."
                  style={{width:"100%",height:200,border:"1px solid #d1d5db",borderRadius:8,padding:10,fontSize:12,fontFamily:"monospace",resize:"vertical"}}/>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={parseImport} disabled={!importText.trim()}
                    style={{flex:1,background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:10,fontWeight:700,cursor:"pointer"}}>
                    분석 & 업데이트
                  </button>
                  <button onClick={()=>setShowImportModal(false)}
                    style={{flex:1,background:"#f3f4f6",color:"#1e293b",border:"none",borderRadius:8,padding:10,cursor:"pointer"}}>
                    닫기
                  </button>
                </div>
              </>
            ) : (
              <>
                <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:14,marginBottom:12}}>
                  <div style={{fontWeight:700,color:"#15803d",marginBottom:8}}>
                    ✅ {importResult.totalAdded}건 추가 / {importResult.cancelledList?.length||0}건 취소 / {importResult.updatedList?.length||0}건 수정
                  </div>
                  {shows.map(s=>importResult.addedByShow[s.id]?.length>0&&(
                    <div key={s.id} style={{fontSize:12,color:"#166534",marginBottom:3}}>
                      <b>{s.label}:</b> {importResult.addedByShow[s.id].map(r=>r.name+`(${r.qty}매)`).join(", ")}
                    </div>
                  ))}
                  {importResult.cancelledList?.length>0&&<div style={{fontSize:12,color:"#92400e",marginTop:5}}><b>취소:</b> {importResult.cancelledList.join(", ")}</div>}
                  {importResult.updatedList?.length>0&&<div style={{fontSize:12,color:"#1d4ed8",marginTop:5}}><b>수정:</b> {importResult.updatedList.join(", ")}</div>}
                  {importResult.skipped?.length>0&&<div style={{fontSize:12,color:"#9ca3af",marginTop:5}}><b>건너뜀:</b> {importResult.skipped.join(", ")}</div>}
                </div>
                <button onClick={()=>setShowImportModal(false)}
                  style={{width:"100%",background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:10,fontWeight:700,cursor:"pointer"}}>
                  확인
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── 설정 모달 ────────────────────────────────────────────────
function SettingsModal({settings, adminKey, shows, onSave, onClose}) {
  const [form, setForm]       = useState(() => JSON.parse(JSON.stringify(settings)));
  const [newAdminKey, setNewAdminKey] = useState(adminKey);
  const iStyle = {width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 10px",fontSize:13};
  const setField = (k,v) => setForm(f=>({...f,[k]:v}));

  const formSources = form.sources || DEFAULT_SETTINGS.sources;
  const addSource = () => setForm(f=>{
    const newName  = "새판매처";
    const newColor = SRC_PALETTE[formSources.length % SRC_PALETTE.length] || "#6b7280";
    const newSources = [...(f.sources||[]), {name:newName,color:newColor}];
    const newAlloc = {...f.seatAlloc};
    return {...f, sources:newSources, seatAlloc:newAlloc};
  });
  const removeSource = (name) => setForm(f=>({...f,sources:(f.sources||[]).filter(s=>s.name!==name)}));
  const updateSourceColor = (name,color) => setForm(f=>({...f,sources:(f.sources||[]).map(s=>s.name===name?{...s,color}:s)}));
  const updateSourceName  = (oldName,newName) => setForm(f=>{
    const newSources = (f.sources||[]).map(s=>s.name===oldName?{...s,name:newName}:s);
    const newAlloc = {};
    Object.keys(f.seatAlloc||{}).forEach(sid=>{
      newAlloc[sid]={};
      Object.keys(f.seatAlloc[sid]||{}).forEach(k=>{
        newAlloc[sid][k===oldName?newName:k] = f.seatAlloc[sid][k];
      });
    });
    return {...f, sources:newSources, seatAlloc:newAlloc};
  });
  const setAllocVal = (sid,src,val) => setForm(f=>({...f,seatAlloc:{...f.seatAlloc,[sid]:{...(f.seatAlloc?.[sid]||{}),[src]:Number(val)||0}}}));

  return (
    <div style={{position:"fixed",inset:0,background:"#0009",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:200,overflowY:"auto",padding:"20px 16px"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:600,maxWidth:"100%",boxShadow:"0 8px 32px #0004",marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:17,marginBottom:20}}>⚙️ 설정</div>

        {/* Admin Key 변경 */}
        <div style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f3f4f6"}}>
            🔑 Admin Key 변경
          </div>
          <input style={iStyle} type="password" value={newAdminKey} onChange={e=>setNewAdminKey(e.target.value)} placeholder="Admin Key"/>
        </div>

        {/* 공연 정보 */}
        <div style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f3f4f6"}}>공연 정보</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>공연명</div>
              <input style={{...iStyle,background:"#f9fafb",color:"#374151"}} value={form.showTitle||""} readOnly/>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>admin 공연 설정에서 연동</div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>페스티벌명</div>
              <input style={iStyle} value={form.festivalName||""} onChange={e=>setField("festivalName",e.target.value)}/>
            </div>
          </div>
          <div style={{maxWidth:160}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>총 객석수 (기본값)</div>
            <NumInput style={iStyle} value={form.totalSeats} onChange={v=>setField("totalSeats",v)}/>
            <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>회차별 좌석수는 admin 기준</div>
          </div>
        </div>

        {/* 판매처 설정 */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f3f4f6"}}>
            <div style={{fontWeight:700,fontSize:13,color:"#374151"}}>판매처 설정</div>
            <button onClick={addSource} style={{background:"#f3f4f6",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>+ 판매처 추가</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {formSources.map(src=>(
              <div key={src.name} style={{display:"flex",alignItems:"center",gap:6,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:"6px 10px"}}>
                <input type="color" value={src.color} onChange={e=>updateSourceColor(src.name,e.target.value)}
                  style={{width:24,height:24,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
                <input value={src.name} onChange={e=>updateSourceName(src.name,e.target.value)}
                  style={{border:"1px solid #d1d5db",borderRadius:6,padding:"4px 8px",fontSize:13,width:90}}/>
                <button onClick={()=>removeSource(src.name)}
                  style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        </div>

        {/* 판매처별 배정 좌석수 */}
        <div style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f3f4f6"}}>
            판매처별 배정 좌석수 <span style={{fontSize:11,fontWeight:400,color:"#9ca3af"}}>(회차는 Redis에서 자동 불러옴)</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:"#f9fafb"}}>
                <th style={{padding:"8px 10px",textAlign:"left",fontWeight:600,fontSize:11,color:"#6b7280"}}>회차</th>
                {formSources.map(src=>(
                  <th key={src.name} style={{padding:"8px 10px",textAlign:"center",fontWeight:600,fontSize:11,color:src.color}}>{src.name}</th>
                ))}
                <th style={{padding:"8px 10px",textAlign:"center",fontWeight:600,fontSize:11,color:"#9ca3af"}}>합계</th>
              </tr>
            </thead>
            <tbody>
              {shows.length === 0 && (
                <tr><td colSpan={formSources.length+2} style={{padding:"12px 10px",color:"#9ca3af",fontSize:12}}>
                  Redis에 회차가 없습니다 — 예약 관리에서 회차를 먼저 추가하세요
                </td></tr>
              )}
              {shows.map(s=>{
                const a   = form.seatAlloc?.[s.id] || {};
                const tot = formSources.reduce((sum,src)=>sum+(src.name==='직접'?(s.seats||0):(a[src.name]||0)),0);
                return (
                  <tr key={s.id} style={{borderTop:"1px solid #f3f4f6"}}>
                    <td style={{padding:"7px 10px",fontSize:12,color:"#374151",whiteSpace:"nowrap"}}>
                      {s.label} {s.time}
                    </td>
                    {formSources.map(src=>{
                      if (src.name === '직접') {
                        return (
                          <td key={src.name} style={{padding:"5px 6px",textAlign:"center"}}>
                            <div style={{border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 8px",fontSize:13,color:"#374151",background:"#f9fafb",fontWeight:600}}>
                              {s.seats||0}
                            </div>
                            <div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>admin 연동</div>
                          </td>
                        );
                      }
                      return (
                        <td key={src.name} style={{padding:"5px 6px"}}>
                          <NumInput value={a[src.name]||0} onChange={v=>setAllocVal(s.id,src.name,v)}
                            style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"5px 8px",fontSize:13,textAlign:"center"}}/>
                        </td>
                      );
                    })}
                    <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,
                      color:tot>form.totalSeats?"#e02424":"#374151"}}>
                      {tot}{tot>form.totalSeats&&<span style={{fontSize:10,marginLeft:2,color:"#e02424"}}>초과!</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave(form, newAdminKey)}
            style={{flex:1,background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:11,fontWeight:700,cursor:"pointer",fontSize:14}}>
            저장
          </button>
          <button onClick={onClose}
            style={{flex:1,background:"#f3f4f6",color:"#1e293b",border:"none",borderRadius:8,padding:11,cursor:"pointer",fontSize:14}}>
            취소
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
